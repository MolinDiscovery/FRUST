site_name: FRUST
site_description: Documentation for the FRUST computational chemistry workflow package.
site_url: https://molindiscovery.github.io/FRUST/
repo_url: https://github.com/MolinDiscovery/FRUST

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_source: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Documentation:
      - Home: index.md
      - Getting Started:
          - Installation:
              - Basic Installation: getting-started/installation.md
              - External Tool Setup: getting-started/external-tool-setup.md
          - Quickstart: getting-started/quickstart.md
      - Workflows:
          - Overview: workflows/overview.md
          - Workflow Method Plans: workflows/workflow-methods.md
          - TS Guess Generation: workflows/ts-guess-generation.md
          - Optimization Pipeline: workflows/optimization-pipeline.md
          - Inspecting Results: workflows/inspecting-results.md
          - Directory And Outputs: workflows/directory-outputs.md
          - DataFrames And Results: workflows/dataframes.md
          - Exporting XYZ Structures: workflows/xyz-export.md
      - Catalyst Screens:
          - Overview: catalyst-screens/overview.md
          - Input Tables: catalyst-screens/input-tables.md
          - TS Guess DataFrames: catalyst-screens/ts-guesses.md
          - Running Screens: catalyst-screens/running.md
      - Visualization:
          - Overview: visualization/overview.md
          - Molecular Grids: visualization/molecular-grids.md
          - DataFrame Inspection: visualization/dataframe-inspection.md
          - Vibrations: visualization/vibrations.md
          - Energy Profiles: visualization/energy-profiles.md
      - External Tools:
          - UMA: external-tools/uma.md
          - g-xTB: external-tools/gxtb.md
      - Cluster:
          - Submission: cluster/submission.md
      - Development:
          - Workflow Architecture: development/workflow-architecture.md
      - Troubleshooting:
          - Failed Calculations: troubleshooting/failed-calculations.md
          - Transition States: troubleshooting/transition-states.md
          - Cluster Runs: troubleshooting/cluster-runs.md
      - API Reference:
          - Screen: api/screen.md
          - TS Guess: api/tsguess.md
          - Visualization: api/vis.md
          - Stepper: api/stepper.md
          - Workflows: api/workflows.md
          - Pipelines: api/pipes.md
          - Cluster: api/cluster.md
          - Schema: api/schema.md
          - Utility Modules: api/utils.md
  - Tutorials:
      - Building Initial DataFrames: tutorials/building-initial-dataframes.md
      - Templates: tutorials/templates.md
      - Catalyst And Substrate Screens: tutorials/catalyst-substrate-screens.md
      - Workflow Method Plans: tutorials/workflow-method-plans.md
